# crash-analyzer Skill 运行期参数
# 修改后无需重启,Skill 每次跑 /analyze-crashes 会重新读取

# ============================================================
# 自家代码包名前缀
# ------------------------------------------------------------
# 栈顶帧 FQCN 匹配则进 A/B/E 桶
# 注意: 匹配对象是栈顶帧 `at <FQCN>.<method>` 里的 FQCN,
#       不是异常类名(异常类可能在 java.lang.* 但栈顶在自家)
# ============================================================
home_packages:
  # 替换为你的 app 自家包前缀(可有多个)
  - com.example.app.
  - dev.example.app.

# ============================================================
# 第三方 SDK / 系统层黑名单
# ------------------------------------------------------------
# 栈顶帧 FQCN 匹配则进 C 类(不归我家管)
# 例外: 异常 message 中包含自家 FQCN/类名时,转 B 类"栈顶第三方但根因疑似自家"
# ============================================================
third_party_packages:
  - android.
  - androidx.
  - org.chromium.
  - com.amap.        # 高德地图
  - dalvik.system.
  - java.lang.
  - libc.so
  - libart.so

# ============================================================
# A 类异常清单(修法明确)
# ------------------------------------------------------------
# 默认为空。跑 2-4 周后由用户根据实际报告加进来。
# 不要预设太多,避免 Skill 把 B 类强行归 A 类。
# ============================================================
known_fix_exceptions: []

# ============================================================
# B 类异常清单(修法不唯一,要业务决策)
# ============================================================
business_decision_exceptions:
  - android.database.sqlite.SQLiteBlobTooBigException
  - java.lang.OutOfMemoryError      # 特例:不走栈顶包名匹配,独立桶
  - android.os.DeadObjectException

# ============================================================
# git log 关联窗口(天)
# ============================================================
git_log_window_days: 30

# ============================================================
# 修复分支名
# ============================================================
fix_branch: auto_fix_bug

# ============================================================
# detekt 配置文件(项目根相对路径)
# Skill 启动时实读此文件,动态构建规避要点清单
# ============================================================
detekt_config: config/detekt/detekt.yml
